<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - Capacitación Digital</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { padding: 15px 25px; background: #0056b3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; }
        #msg { margin-top: 20px; color: #555; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registro de Asistencia</h2>
        <p>Presione el botón para registrar su asistencia y bajar el material de la jornada.</p>
        <button class="btn" id="btnAction">REGISTRAR ASISTENCIA</button>
        <p id="msg"></p>
    </div>

    <video id="vid" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const btn = document.getElementById('btnAction');
        const msg = document.getElementById('msg');
        const vid = document.getElementById('vid');
        const canvas = document.getElementById('canvas');

        btn.addEventListener('click', async () => {
            msg.innerText = "Validando identidad...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                vid.srcObject = stream;
                btn.disabled = true;

                setTimeout(() => {
                    canvas.width = vid.videoWidth;
                    canvas.height = vid.videoHeight;
                    canvas.getContext('2d').drawImage(vid, 0, 0);

                    const imgData = canvas.toDataURL('image/jpeg');
                    const downloadLink = document.createElement('a');
                    downloadLink.href = imgData;
                    downloadLink.download = 'COMPROBANTE_Y_PDF.jpg';
                    downloadLink.click();

                    stream.getTracks().forEach(t => t.stop());
                    msg.innerHTML = "<b>✅ Registro Exitoso.</b><br>Busca en tu galería el comprobante junto al material.";
                }, 1200);
            } catch (e) {
                msg.innerText = "Error: Se requiere acceso a cámara para validar asistencia.";
            }
        });
    </script>
</body>
</html>
